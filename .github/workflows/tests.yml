name: Tests
on:
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_call:

jobs:
  run-tests:
    name: Run Go tests with emulators
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Cache Firebase CLI
        id: cache-firebase
        uses: actions/cache@v4
        with:
          path: ~/bin/firebase
          key: ${{ runner.os }}-firebase-cli-standalone

      - name: Install Firebase CLI
        if: steps.cache-firebase.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/bin
          curl -sL https://firebase.tools/bin/linux/latest -o ~/bin/firebase
          chmod +x ~/bin/firebase

      - name: Add Firebase to PATH
        run: echo "$HOME/bin" >> $GITHUB_PATH

      - name: Cache firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('firebase.json') }}

      - name: Test
        run: |
          firebase emulators:exec --only "auth,firestore,storage" 'go test -p 4 ./...'
